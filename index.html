<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Culture Vault</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#050507; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#fff; }
  #scene { position:fixed; inset:0; z-index:2; }
  #frame { position:fixed; inset:0; z-index:1; border:0; width:100%; height:100%; background:#050507; }
  /* digital / encrypted overlays */
  #scan { position:fixed; inset:0; z-index:3; pointer-events:none; opacity:.5; mix-blend-mode:overlay;
          background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.035) 0 1px, transparent 1px 3px); }
  #vig  { position:fixed; inset:0; z-index:3; pointer-events:none;
          background:radial-gradient(circle at 50% 45%, transparent 45%, rgba(0,0,0,0.55) 100%); }
  #flash { position:fixed; inset:0; z-index:4; pointer-events:none; opacity:0;
           background:radial-gradient(circle at 50% 50%, #ffffff 0%, #eef0f3 45%, #c7cace 100%); }
  /* brand mark */
  #brand { position:fixed; top:20px; left:22px; z-index:5; transition:opacity .5s;
           font:600 12px/1.3 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:3px; color:rgba(255,255,255,0.88); }
  #brand .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#ff2238;
                box-shadow:0 0 9px #ff2238; margin-right:8px; vertical-align:middle; animation:blink 1.6s infinite; }
  #brand small { display:block; font-weight:400; font-size:9.5px; letter-spacing:2px; color:rgba(255,255,255,0.42); margin-top:4px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  /* minimal control: code field + enter only */
  #panel { position:fixed; left:50%; bottom:7vh; transform:translateX(-50%); z-index:5;
           display:flex; flex-direction:column; align-items:center; gap:10px; transition:opacity .5s, transform .5s; }
  #row { display:flex; gap:8px; }
  #pw { width:200px; padding:12px 16px; font-size:15px; letter-spacing:4px; text-align:center;
        color:#fff; background:rgba(12,12,14,0.55); backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.28); border-radius:8px; outline:none;
        transition:border-color .15s, box-shadow .15s; }
  #pw::placeholder { color:rgba(255,255,255,0.35); letter-spacing:2px; }
  #pw:focus { border-color:#ff2238; box-shadow:0 0 0 3px rgba(255,34,56,0.28); }
  #go { padding:12px 24px; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
        color:#fff; background:linear-gradient(180deg,#ff2238,#c2101f); border:none; border-radius:8px;
        cursor:pointer; box-shadow:0 6px 18px rgba(255,34,56,0.35); transition:filter .15s; }
  #go:hover { filter:brightness(1.1); }
  #go:disabled { filter:grayscale(.4) brightness(.8); cursor:default; }
  #err { color:#ff5a60; font-size:12px; letter-spacing:.5px; min-height:15px; text-align:center; }
  #cap { font:400 10px/1.4 ui-monospace,Menlo,monospace; letter-spacing:2px; text-transform:uppercase;
         color:rgba(255,255,255,0.42); }
  .shake { animation:shake .45s; }
  @keyframes shake { 10%,90%{transform:translateX(-50%) translateX(-2px)} 20%,80%{transform:translateX(-50%) translateX(4px)}
    30%,50%,70%{transform:translateX(-50%) translateX(-7px)} 40%,60%{transform:translateX(-50%) translateX(7px)} }
  #loading { position:fixed; inset:0; z-index:6; display:flex; align-items:center; justify-content:center;
             background:#050507; transition:opacity .6s; }
  #loading .bar { width:34px; height:2px; background:linear-gradient(90deg,transparent,#ff2238,transparent);
                  animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.15} 50%{opacity:1} }
</style>
</head>
<body>
<div id="loading"><div class="bar"></div></div>
<canvas id="scene"></canvas>
<div id="scan"></div>
<div id="vig"></div>
<div id="flash"></div>
<div id="brand"><span class="dot"></span>CULTURE&nbsp;VAULT<small>AES-256 · ENCRYPTED</small></div>
<div id="panel">
  <form id="f"><div id="row">
    <input id="pw" type="password" autocomplete="off" autofocus placeholder="Code" />
    <button id="go" type="submit">Enter</button>
  </div></form>
  <div id="err"></div>
  <div id="cap">Protected by Culture Vault · Authorized access only</div>
</div>
<noscript><div style="padding:40px;text-align:center">JavaScript is required to view this preview.</div></noscript>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
const ITER = 200000;
const $ = id => document.getElementById(id);
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const clamp01 = t => Math.max(0, Math.min(1, t));

/* ---------- decryption (the code is the key) ---------- */
async function decrypt(pw){
  const buf = new Uint8Array(await (await fetch('content.enc')).arrayBuffer());
  const salt = buf.slice(0,16), iv = buf.slice(16,28), data = buf.slice(28);
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  return crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data); // throws on wrong code
}

let THREE, scene, camera, renderer, vault, wheel, doorPivot, bolts=[], innerLight;
let orb, orbMats=[], scanRing;
let state = 'idle', tStart = 0, clock0 = 0, rafId;
let pendingIframeURL = null;
let restZ = 6.6, orbBase = 0.72;

// the vault circle is wide; on portrait/narrow screens pull the camera back and
// shrink the orb so the whole door fits and the wireframe doesn't sprawl to the edges.
function fit(){
  const a = innerWidth / innerHeight;
  restZ   = a < 0.72 ? 6.6 + (0.72 - a) * 6.0 : 6.6;
  orbBase = a < 0.72 ? 0.60 : 0.72;
}

async function init(){
  THREE = await import('three');
  const { RoomEnvironment } = await import('three/addons/environments/RoomEnvironment.js');

  renderer = new THREE.WebGLRenderer({ canvas:$('scene'), antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050507);
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.03).texture;

  fit();
  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 0, restZ);

  // lights — clean white key + cool rim + red kicker
  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const keyL = new THREE.DirectionalLight(0xffffff, 2.6); keyL.position.set(-4,5,6); scene.add(keyL);
  const rim = new THREE.DirectionalLight(0xbfc6d0, 1.6); rim.position.set(5,-2,3); scene.add(rim);
  const red = new THREE.PointLight(0xff2238, 0.9, 24); red.position.set(2.5,-2.5,2.5); scene.add(red);
  const warm = new THREE.PointLight(0xffffff, 0.0, 30); warm.position.set(0,0,-1.3); scene.add(warm);
  innerLight = warm;

  // materials — black / white / chrome, with silver + red secondary
  const chrome   = new THREE.MeshStandardMaterial({ color:0xd6dadf, metalness:1.0, roughness:0.08 });
  const steel    = new THREE.MeshStandardMaterial({ color:0xb4b9c0, metalness:1.0, roughness:0.16 });
  const blackMet = new THREE.MeshStandardMaterial({ color:0x1c1e22, metalness:1.0, roughness:0.30 });
  const redMat   = new THREE.MeshStandardMaterial({ color:0xff2238, metalness:0.6, roughness:0.30,
                                                    emissive:0xff2238, emissiveIntensity:0.4 });

  vault = new THREE.Group(); scene.add(vault);

  // interior glow plane (behind the door)
  const inner = new THREE.Mesh(new THREE.CircleGeometry(2.0, 48),
    new THREE.MeshBasicMaterial({ color:0x070709 }));
  inner.position.z = -1.4; vault.add(inner);
  vault.userData.inner = inner;

  // outer frame ring
  const frame = new THREE.Mesh(new THREE.TorusGeometry(2.45, 0.42, 24, 64), blackMet);
  frame.position.z = -0.2; vault.add(frame);
  const frame2 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.16, 20, 64), chrome);
  frame2.position.z = 0.0; vault.add(frame2);

  // digital "scan" ring — cyan, slowly rotating, signals active encryption
  const scanMat = new THREE.LineDashedMaterial({ color:0xff2238, transparent:true, opacity:0.55, dashSize:0.18, gapSize:0.12 });
  scanRing = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(
    Array.from({length:129}, (_,i)=> new THREE.Vector3(Math.cos(i/128*Math.PI*2)*2.32, Math.sin(i/128*Math.PI*2)*2.32, 0))
  ), scanMat);
  scanRing.computeLineDistances(); scanRing.position.z = 0.5; vault.add(scanRing);

  // ---- door (swings on a hinge at the left edge) ----
  doorPivot = new THREE.Group();
  doorPivot.position.set(-2.05, 0, 0.05);
  vault.add(doorPivot);
  const door = new THREE.Group();
  door.position.set(2.05, 0, 0); // re-center the disc at origin
  doorPivot.add(door);

  const disc = new THREE.Mesh(new THREE.CylinderGeometry(2.05, 2.05, 0.42, 64), steel);
  disc.rotation.x = Math.PI/2; door.add(disc);
  [[1.7,0.05],[1.25,0.05],[0.8,0.05]].forEach(([r,t])=>{
    const ring = new THREE.Mesh(new THREE.TorusGeometry(r, t, 16, 64), blackMet);
    ring.position.z = 0.22; door.add(ring);
  });
  const redRing = new THREE.Mesh(new THREE.TorusGeometry(1.45, 0.03, 12, 64), redMat);
  redRing.position.z = 0.24; door.add(redRing);

  // bolts around the rim (red accents)
  for(let i=0;i<8;i++){
    const a = i/8 * Math.PI*2;
    const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.2), redMat);
    b.userData.angle = a; b.userData.r0 = 1.92;
    placeBolt(b, 1.92); door.add(b); bolts.push(b);
  }

  // ---- central locking wheel (chrome) ----
  wheel = new THREE.Group(); wheel.position.z = 0.24; door.add(wheel);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.3,32), chrome);
  hub.rotation.x = Math.PI/2; wheel.add(hub);
  const hubCore = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.34,24), redMat);
  hubCore.rotation.x = Math.PI/2; wheel.add(hubCore);
  const rim3 = new THREE.Mesh(new THREE.TorusGeometry(0.62,0.075,16,48), chrome); wheel.add(rim3);
  for(let i=0;i<5;i++){
    const ang = i/5*Math.PI*2;
    const sp = new THREE.Mesh(new THREE.BoxGeometry(1.24,0.075,0.075), chrome);
    sp.rotation.z = ang; wheel.add(sp);
    const knob = new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), chrome);
    knob.position.set(Math.cos(ang)*0.62, Math.sin(ang)*0.62, 0); wheel.add(knob);
  }

  // ---- floating wireframe orb ("dragon egg"), moved onto the vault face ----
  orb = new THREE.Group();
  orb.position.set(0, 0, 1.45);     // hovering in front of the door
  orb.scale.setScalar(orbBase);
  const wireMat  = new THREE.LineBasicMaterial({ color:0xff2238, transparent:true, opacity:0.9 });
  orb.add(new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(1.7,1)), wireMat));
  const oInnerMat = new THREE.MeshBasicMaterial({ color:0xff2238, transparent:true, opacity:0.10 });
  orb.add(new THREE.Mesh(new THREE.IcosahedronGeometry(1.15,0), oInnerMat));
  const tetraMat = new THREE.LineBasicMaterial({ color:0xcfcfd6, transparent:true, opacity:0.35 });
  orb.add(new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.TetrahedronGeometry(2.5,0)), tetraMat));
  vault.add(orb);
  orbMats = [[wireMat,0.9],[oInnerMat,0.12],[tetraMat,0.4]];

  addEventListener('resize', onResize);
  clock0 = performance.now();
  $('loading').style.opacity = '0';
  setTimeout(()=>$('loading').style.display='none', 600);
  $('pw').focus();
  animate();
}
function placeBolt(b, r){
  b.position.set(Math.cos(b.userData.angle)*r, Math.sin(b.userData.angle)*r, 0.0);
  b.rotation.z = b.userData.angle;
}
function onResize(){
  fit();
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if(state === 'idle'){ camera.position.z = restZ; camera.position.x = 0; }
}

function animate(){
  rafId = requestAnimationFrame(animate);
  const now = performance.now();
  const t = (now - clock0)/1000;

  if(state === 'idle'){
    vault.rotation.y = Math.sin(t*0.4)*0.05;
    vault.rotation.x = Math.sin(t*0.33)*0.03;
    wheel.rotation.z = Math.sin(t*0.6)*0.04;
    scanRing.rotation.z = t*0.25;
    orb.rotation.y = t*0.3; orb.rotation.x = t*0.18;
    orb.scale.setScalar(orbBase*(1 + Math.sin(t*1.4)*0.03));
  } else if(state === 'unlocking'){
    const p = clamp01((now - tStart)/2000); // 2s
    // orb spins up and dissolves first (the seal breaking)
    const of = 1 - easeInOut(clamp01(p/0.42));
    orbMats.forEach(([m,o]) => m.opacity = o*of);
    orb.rotation.y += 0.16; orb.rotation.x += 0.05;
    orb.scale.setScalar(orbBase*(1 + (1-of)*0.7));
    if(of <= 0) orb.visible = false;
    scanRing.rotation.z += 0.05; scanRing.material.opacity = 0.55*of;
    const wp = easeOut(clamp01(p/0.4));                 // wheel spins
    wheel.rotation.z = wp * Math.PI*4.2;
    const bp = easeInOut(clamp01((p-0.30)/0.30));       // bolts retract
    bolts.forEach(b => placeBolt(b, b.userData.r0 - bp*0.45));
    const dp = easeInOut(clamp01((p-0.42)/0.53));       // door swings open
    doorPivot.rotation.y = dp * 1.85;
    const cp = easeInOut(clamp01((p-0.5)/0.5));          // light swell + camera dolly
    innerLight.intensity = cp * 10;
    vault.userData.inner.material.color.setRGB(0.03+cp*0.97, 0.03+cp*0.97, 0.03+cp*0.97);
    camera.position.z = restZ - cp*(restZ - 1.0);
    camera.position.x = cp*0.35;
    vault.rotation.set(0,0,0);
    $('flash').style.opacity = String(clamp01((p-0.8)/0.2)); // flash fills screen
    if(p >= 1) reveal();
  }
  renderer.render(scene, camera);
}

function startUnlock(){
  state = 'unlocking';
  tStart = performance.now();
  $('panel').style.opacity = '0';
  $('panel').style.transform = 'translateX(-50%) translateY(20px)';
  $('brand').style.opacity = '0';
}

// Same-origin (blob:) so we can enhance the revealed export for the client:
//  - suppress the #__bundler_err / #__bundler_loading dev overlay it pins on decode errors
//  - add the missing viewport meta + a mobile stylesheet (the export ships none).
// Selectors are tag/semantic-class/inline-style based (no hashed classes), so they
// survive re-exports. CSS rules apply even to nodes the bundler adds asynchronously.
const REVEAL_CSS = `#__bundler_err,#__bundler_loading{display:none!important}
@media (max-width:700px){
  nav{flex-wrap:wrap!important;height:auto!important;row-gap:3px!important;column-gap:10px!important;padding:8px 12px!important;justify-content:center!important;}
  nav>*{flex-wrap:wrap!important;justify-content:center!important;column-gap:10px!important;row-gap:2px!important;min-width:0!important;}
  nav a{font-size:10px!important;letter-spacing:.5px!important;}
  h1.glitch{font-size:clamp(44px,15vw,92px)!important;}
  [style*="vertical-rl"]{display:none!important;}
  canvas{opacity:.22!important;}
  [style*="grid-template-columns"]{grid-template-columns:1fr!important;}
}`;
function enhanceRevealed(f){
  const inject = () => { try{
    const doc = f.contentDocument; if(!doc) return;
    if(doc.head && !doc.querySelector('meta[name="viewport"]')){
      const m = doc.createElement('meta'); m.name = 'viewport';
      m.content = 'width=device-width, initial-scale=1, viewport-fit=cover';
      doc.head.appendChild(m);
    }
    if(!doc.getElementById('__cv_enh')){
      const s = doc.createElement('style'); s.id = '__cv_enh';
      s.textContent = REVEAL_CSS;
      (doc.head || doc.documentElement).appendChild(s);
    }
    doc.querySelectorAll('#__bundler_err').forEach(n => n.remove());
    // mobile: the section-6 episode clips only play on desktop hover (dead on touch). Make them a
    // clear, tappable "CLICK TO RUN" control. React re-renders these cards, so per-node handlers get
    // wiped — use event delegation on the document + a MutationObserver to stay attached.
    const W = f.contentWindow;
    if(W && W.matchMedia('(max-width:700px)').matches){
      // iOS Safari can't play the bundle's WebM clips, so swap each episode card's <video>
      // to an H.264 MP4 hosted alongside this gate (E01, E10 in DOM order).
      const CLIP_BASE = location.href.replace(/[^/]*$/, '') + 'clips/';
      const MP4 = ['ep01.mp4', 'ep10.mp4'];
      const relabel = () => {
        const seen = new Set(); let idx = 0;
        doc.querySelectorAll('div').forEach(el => {
          if(el.children.length !== 0) return;
          const isHover = /^\s*▶\s*HOVER\s*$/i.test(el.textContent);
          if(!isHover && !/CLICK TO RUN|■\s*STOP/i.test(el.textContent)) return;
          if(isHover){
            el.textContent = '▶ CLICK TO RUN';
            el.style.cssText += ';font-size:11px;padding:6px 11px;cursor:pointer;';
          }
          let h = el.parentElement, n = 0;
          while(h && !h.querySelector('video') && n < 6){ h = h.parentElement; n++; }
          const v = h && h.querySelector('video');
          if(v && !seen.has(v)){
            seen.add(v);
            v.setAttribute('playsinline',''); v.muted = true; v.loop = true;
            if(v.dataset.cvMp4 !== '1' && MP4[idx]){
              v.dataset.cvMp4 = '1'; v.src = CLIP_BASE + MP4[idx]; v.load();
            }
            idx++;
          }
        });
      };
      relabel();
      if(!doc.__cvVid){
        doc.__cvVid = true;
        doc.addEventListener('click', e => {
          let host = e.target, hops = 0, v = null;
          while(host && hops < 8){ if(host.querySelector && (v = host.querySelector('video'))) break; host = host.parentElement; hops++; }
          if(!v || !host) return;
          const tag = [...host.querySelectorAll('div')].find(x => x.children.length === 0 && /CLICK TO RUN|■\s*STOP/i.test(x.textContent));
          if(!tag) return;                              // only the relabelled episode cards react
          e.preventDefault(); e.stopPropagation();
          if(v.paused){ try{ v.currentTime = 0; }catch(_){} v.style.opacity = '1';
            const p = v.play(); if(p && p.catch) p.catch(()=>{}); tag.textContent = '■ STOP'; }
          else { v.pause(); v.style.opacity = '0'; tag.textContent = '▶ CLICK TO RUN'; }
        }, true);
        new W.MutationObserver(relabel).observe(doc.body, { childList:true, subtree:true });
      }
    }
  }catch(_){}};
  f.addEventListener('load', inject);
  let n = 0; const iv = setInterval(() => { inject(); if(++n > 28) clearInterval(iv); }, 250);
}

function reveal(){
  if(state === 'open') return;
  state = 'open';
  const f = document.createElement('iframe');
  f.id = 'frame'; f.src = pendingIframeURL;
  // delegate media permissions down to nested embeds (YouTube needs encrypted-media)
  f.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write; accelerometer; gyroscope';
  f.setAttribute('allowfullscreen', '');
  enhanceRevealed(f);
  document.body.appendChild(f);
  $('scene').style.display = 'none';
  $('scan').style.display = 'none';
  $('vig').style.display = 'none';
  cancelAnimationFrame(rafId);
  setTimeout(()=>{ $('flash').style.transition = 'opacity .7s ease'; $('flash').style.opacity = '0'; }, 140);
}

/* ---------- form handling ---------- */
$('f').addEventListener('submit', async e => {
  e.preventDefault();
  if(state !== 'idle') return;
  const go = $('go'), err = $('err'), panel = $('panel');
  err.textContent=''; go.disabled=true; go.textContent='…'; $('cap').textContent='Decrypting…';
  try {
    const plain = await decrypt($('pw').value);
    pendingIframeURL = URL.createObjectURL(new Blob([plain], { type:'text/html' }));
    startUnlock();
  } catch(_){
    go.disabled=false; go.textContent='Enter';
    err.textContent='Incorrect code.';
    $('cap').textContent='Protected by Culture Vault · Authorized access only';
    panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake');
    $('pw').value=''; $('pw').focus();
  }
});

/* ---------- boot, with graceful fallback ---------- */
init().catch(err => {
  console.error(err);
  $('loading').style.display='none';
  state = 'idle';
  $('f').onsubmit = async e => {
    e.preventDefault();
    const go=$('go'); go.disabled=true; go.textContent='…';
    try{
      const plain = await decrypt($('pw').value);
      const url = URL.createObjectURL(new Blob([plain],{type:'text/html'}));
      const f=document.createElement('iframe'); f.id='frame'; f.style.zIndex=9; f.src=url;
      f.allow='autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write; accelerometer; gyroscope';
      f.setAttribute('allowfullscreen','');
      enhanceRevealed(f);
      document.body.appendChild(f);
    }catch(_){ go.disabled=false; go.textContent='Enter'; $('err').textContent='Incorrect code.'; }
  };
});
</script>
</body>
</html>
